<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shinobi Database - Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>SHINOBI DATABASE</h1>
        <p>Search for Characters, Jutsus, Clans, or Arcs</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search (e.g., Itachi, Rasengan, Uchiha)..." onkeyup="searchDatabase()">
    </div>

    <main class="database-grid" id="databaseGrid"></main>

    <div id="noResult" class="hidden">No match found in the archives.</div>

    <script>
        // 1. Yahan humara saara data ek jagah structured hai
        const shinobiData = [
            { 
                name: "Naruto Uzumaki", 
                badgeText: "Character", 
                badgeClass: "character", 
                attribute1: "Clan: Uzumaki", 
                attribute2: "Jutsu: Rasengan" 
            },
            { 
                name: "Itachi Uchiha", 
                badgeText: "Character", 
                badgeClass: "character", 
                attribute1: "Clan: Uchiha", 
                attribute2: "Jutsu: Tsukuyomi" 
            },
            { 
                name: "Sasuke Uchiha", 
                badgeText: "Character", 
                badgeClass: "character", 
                attribute1: "Clan: Uchiha", 
                attribute2: "Jutsu: Chidori" 
            },
            { 
                name: "Edo Tensei", 
                badgeText: "Jutsu", 
                badgeClass: "jutsu", 
                attribute1: "Type: Forbidden", 
                attribute2: "Creator: Tobirama" 
            },
            { 
                name: "Uchiha Clan", 
                badgeText: "Clan", 
                badgeClass: "clan", 
                attribute1: "Dojutsu: Sharingan", 
                attribute2: "Status: Mostly Deceased" 
            },
            { 
                name: "Chunin Exams Arc", 
                badgeText: "Arc", 
                badgeClass: "arc", 
                attribute1: "Episodes: 20-67", 
                attribute2: "Status: Canon" 
            }
        ];

        const grid = document.getElementById('databaseGrid');
        const noResult = document.getElementById('noResult');

        // 2. Yeh function data padhkar HTML cards banata hai
        function displayCards(data) {
            grid.innerHTML = ""; // Pehle grid ko clear karo
            
            if (data.length === 0) {
                noResult.classList.remove('hidden');
            } else {
                noResult.classList.add('hidden');
                
                data.forEach(item => {
                    // Har item ke liye ek card create karo
                    let cardHTML = `
                        <div class="card">
                            <span class="badge ${item.badgeClass}">${item.badgeText}</span>
                            <h3>${item.name}</h3>
                            <p><strong>${item.attribute1.split(':')[0]}:</strong> ${item.attribute1.split(':')[1]}</p>
                            <p><strong>${item.attribute2.split(':')[0]}:</strong> ${item.attribute2.split(':')[1]}</p>
                        </div>
                    `;
                    grid.innerHTML += cardHTML; // Card ko grid mein daal do
                });
            }
        }

        // 3. Yeh function search input ke hisaab se data filter karta hai
        function searchDatabase() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            
            // Data filter karo agar name ya type mein input match ho
            let filteredData = shinobiData.filter(item => {
                return item.name.toLowerCase().includes(input) || item.badgeText.toLowerCase().includes(input);
            });

            displayCards(filteredData);
        }

        // Website load hote hi saare cards dikhane ke liye function call
        displayCards(shinobiData);
    </script>
</body>
</html>
